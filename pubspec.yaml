name: licenciamiento
description: "Aplicación base con arquitectura limpia y escalable."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # Local Storage
  shared_preferences: ^2.3.5
  
  # Network (preparado para REST)
  http: ^1.3.0
  
  # Utilities
  equatable: ^2.0.7
  
  # Image Picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
